name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend – Lint, Types, Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy app/

      - name: Tests
        run: pytest tests/ -v --tb=short

      - name: Coverage
        run: pytest --cov=app --cov-report=xml --cov-fail-under=25

  # frontend:
  #   name: Frontend – Lint, Types, Tests
  #   TODO: Aktivieren sobald frontend/package-lock.json existiert

  # schema-sync:
  #   name: API-Schema aktuell?
  #   TODO: Aktivieren sobald scripts/generate_schema.py existiert

  docker-build:
    name: Docker-Build-Check
    runs-on: ubuntu-latest
    needs: [backend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Build Backend-Image
        run: docker build backend/ -t job-agent-backend:test

      - name: Build Frontend-Image
        run: docker build frontend/ -t job-agent-frontend:test
