name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend – Lint, Types, Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy app/

      - name: Tests
        run: pytest tests/ -v --tb=short

      - name: Coverage
        run: pytest --cov=app --cov-report=xml --cov-fail-under=70

  frontend:
    name: Frontend – Lint, Types, Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint (ESLint)
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Tests (Vitest)
        run: npm run test:run

  schema-sync:
    name: API-Schema aktuell?
    runs-on: ubuntu-latest
    needs: [backend]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"
          cache: "pip"

      - run: pip install -e ".[dev]"
        working-directory: backend

      - name: Schema generieren und vergleichen
        run: |
          python scripts/generate_schema.py --output /tmp/current_schema.json
          diff docs/api/openapi.json /tmp/current_schema.json || \
            (echo "OpenAPI-Schema ist veraltet. Bitte 'make types' ausführen und committen." && exit 1)

  docker-build:
    name: Docker-Build-Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Build Backend-Image
        run: docker build backend/ -t job-agent-backend:test

      - name: Build Frontend-Image
        run: docker build frontend/ -t job-agent-frontend:test
