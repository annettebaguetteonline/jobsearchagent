name: PR-Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  pr-title:
    name: PR-Titel (Conventional Commits)
    runs-on: ubuntu-latest

    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50  # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            test
            docs
            chore
            perf

  changed-files:
    name: Geänderte Dateien erkennen
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3.0.2
        id: changes
        with:
          filters: |
            schema:
              - 'backend/app/api/**'

      - name: Warnung bei API-Änderung ohne Schema-Update
        if: steps.changes.outputs.schema == 'true'
        run: echo "API-Dateien geändert — bitte 'make types' ausführen und committen."
