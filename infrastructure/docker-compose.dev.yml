services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../backend/app:/app/app
      - ../data:/app/data
      - ./secrets:/run/secrets:ro
    environment:
      APP_ENV: development
      LOG_LEVEL: DEBUG
      OLLAMA_HOST: "http://host.docker.internal:11434"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
    networks:
      - agent-net

networks:
  agent-net:
    driver: bridge
