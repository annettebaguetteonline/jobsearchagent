services:
  backend:
    user: "${UID:-1000}:${GID:-1000}"
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../backend/app:/app/app
      - ../data:/app/data
      - ./secrets:/run/secrets:ro
    environment:
      APP_ENV: development
      LOG_LEVEL: DEBUG
      OLLAMA_HOST: "http://ollama:11434"
      SCRAPE_POSTED_WITHIN_DAYS: "7"
      PLAYWRIGHT_BROWSERS_PATH: "/ms-playwright"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    #depends_on:
    #  ollama:
    #    condition:
    #      service_healthy
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
    networks:
      - agent-net

  scheduler:
    image: alpine:3.21
    depends_on:
      - backend
    networks:
      - agent-net
    restart: unless-stopped
    entrypoint: >
      sh -c "
        echo '0 7 * * 1-5 curl -sf -X POST http://backend:8000/api/scrape/start -H \"Content-Type: application/json\" -d \"{\\\"sources\\\": [\\\"service_bund\\\", \\\"arbeitsagentur\\\", \\\"interamt\\\", \\\"arbeitnow\\\", \\\"stellenmarkt\\\", \\\"adzuna\\\", \\\"jooble\\\", \\\"jobboerse\\\", \\\"kimeta\\\"]}\" >> /var/log/scrape.log 2>&1' | crontab -
        crond -f -l 6
      "
