line-length = 100
target-version = "py314"

[lint]
select = ["E", "F", "I", "N", "UP", "B", "S", "ANN"]
ignore = [
    "ANN101",  # self braucht keine Annotation
    "S101",    # assert ist in Tests erlaubt
]

[lint.per-file-ignores]
"tests/**" = ["S", "ANN"]
"app/main.py" = ["ANN"]

[format]
quote-style = "double"
indent-style = "space"
